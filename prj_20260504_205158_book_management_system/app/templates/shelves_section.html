<section id="shelves">
  <h2>Shelves</h2>
  <table class="table table-sm">
    <thead><tr><th>ID</th><th>Name</th><th>Code</th><th>Room</th><th></th></tr></thead>
    <tbody>
      {% for s in shelves|default([]) %}
      <tr>
        <td>{{ s.shelf_id }}</td>
        <td>{{ s.shelf_name }}</td>
        <td>{{ s.shelf_code }}</td>
        <td>{{ s.room_name }}</td>
        <td>
          <button class="btn btn-sm btn-danger" hx-delete="shelves/{{ s.shelf_id }}" hx-ext="json-enc" hx-target="#message" hx-swap="innerHTML" hx-confirm="Delete shelf?">Delete</button>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>

  <h3>Create shelf</h3>
  <form hx-post="shelves" hx-ext="json-enc" hx-target="#message" class="row g-2">
    <div class="col-md-2"><input class="form-control" name="room_id" type="number" placeholder="Room ID" required /></div>
    <div class="col-md-3"><input class="form-control" name="shelf_name" placeholder="Name" required /></div>
    <div class="col-md-3"><input class="form-control" name="shelf_code" placeholder="Code" required /></div>
    <div class="col-md-3"><input class="form-control" name="shelf_description" placeholder="Description" required /></div>
    <div class="col-md-12"><button class="btn btn-primary w-100" type="submit">Create</button></div>
  </form>
</section>
